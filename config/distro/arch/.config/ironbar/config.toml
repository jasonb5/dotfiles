position = "top"
height = 24

[[start]]
type = "label"
label = "brightness {{ sh -c 'for d in /sys/class/backlight/*; do [ -f \"$d/brightness\" ] || continue; b=$(cat \"$d/brightness\"); m=$(cat \"$d/max_brightness\"); printf \"%d%%\" $(( b * 100 / m )); break; done' }}"
show_if = "sh -c 'set -- /sys/class/backlight/*; [ -e \"$1\" ]'"

[[start]]
type = "battery"
show_if = "sh -c 'set -- /sys/class/power_supply/BAT*; [ -e \"$1\" ]'"

[[start]]
type = "volume"
max_volume = 125
on_scroll_up = "sh -c 'vol=$(pactl get-sink-volume @DEFAULT_SINK@ | head -n1 | cut -d/ -f2 | tr -d \" %\"); new=$((vol + 5)); [ \"$new\" -gt 125 ] && new=125; pactl set-sink-volume @DEFAULT_SINK@ \"$new%\"'"
on_scroll_down = "pactl set-sink-volume @DEFAULT_SINK@ -5%"

[[start]]
type = "bluetooth"

[[center]]
type = "workspaces"

[[center]]
type = "notifications"

[[end]]
type = "tray"

[[end]]
type = "clock"
