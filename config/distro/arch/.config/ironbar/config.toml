position = "top"
height = 24

[[start]]
type = "label"
class = "brightness"
label = "{{ sh -c 'for d in /sys/class/backlight/*; do [ -f \"$d/brightness\" ] || continue; b=$(cat \"$d/brightness\"); m=$(cat \"$d/max_brightness\"); p=$(( b * 100 / m )); if [ \"$p\" -lt 25 ]; then printf \"󰃞\"; elif [ \"$p\" -lt 50 ]; then printf \"󰃟\"; elif [ \"$p\" -lt 75 ]; then printf \"󰃠\"; else printf \"󰃠\"; fi; break; done' }}"
on_scroll_up = "brightnessctl -q set +10%"
on_scroll_down = "brightnessctl -q set 10%-"
show_if = "sh -c 'set -- /sys/class/backlight/*; [ -e \"$1\" ]'"

[[start]]
type = "battery"
show_icon = true
show_label = false
show_if = "sh -c 'set -- /sys/class/power_supply/BAT*; [ -e \"$1\" ]'"

[[start]]
type = "label"
label = "{{1000:sh -c 'p=$(tuned-adm active 2>/dev/null | sed -n \"s/^Current active profile: //p\"); case $p in throughput-performance|latency-performance|accelerator-performance) printf \"󰓅\" ;; balanced|balanced-battery) printf \"󰾅\" ;; powersave) printf \"󰌪\" ;; *) printf \"󰒓\" ;; esac'}}"
show_if = "sh -c 'command -v tuned-adm >/dev/null 2>&1'"
on_click_left = "sh -c 'current=$(tuned-adm active 2>/dev/null | sed -n \"s/^Current active profile: //p\"); case $current in throughput-performance|latency-performance|accelerator-performance) next=powersave ;; powersave) next=balanced ;; balanced|balanced-battery|*) next=throughput-performance ;; esac; pkexec tuned-adm profile \"$next\"'"

[[start]]
type = "volume"
format = "{icon}"
mute_format = "{icon}"
max_volume = 125
on_scroll_up = "sh -c 'vol=$(pactl get-sink-volume @DEFAULT_SINK@ | head -n1 | cut -d/ -f2 | tr -d \" %\"); new=$((vol + 5)); [ \"$new\" -gt 125 ] && new=125; pactl set-sink-volume @DEFAULT_SINK@ \"$new%\"'"
on_scroll_down = "pactl set-sink-volume @DEFAULT_SINK@ -5%"

[[start]]
type = "bluetooth"
format.not_found = ""
format.disabled = "󰂲"
format.enabled = ""
format.connected = ""
format.connected_battery = ""

[[center]]
type = "workspaces"

[[center]]
type = "notifications"

[[end]]
type = "tray"

[[end]]
type = "clock"
format = "󰥔 %H:%M"
