# https://willhbr.net/2024/03/06/tmux-conf-with-commentary/
unbind -T root -aq
unbind -T prefix -aq
unbind -T nested -aq
unbind -T popup -aq
unbind -T copy-mode -aq

set -g mode-keys vi
set -g status-position bottom
set -g base-index 1
set -g renumber-windows on
set -g history-limit 10000

if "[ $(tput colors) = 16777216 ]" {
	set -g default-terminal "tmux-direct"
} {
	if "[ $(tput colors) = 256 ]" {
		set -g default-terminal "tmux-256color"
	} {
		set -g default-terminal "tmux"
	}
}

set -g prefix C-a
bind C-a send-prefix

bind r {
	source-file ~/.tmux.conf
	display "Reloaded ~/.tmux.conf"
}

set -s escape-time 0
set -g focus-events on
set -g allow-rename on

bind c new-window -c '#{pane_current_path}' -a -t '{next}'
bind -n M-c new-window -c '#{pane_current_path}' -a -t '{next}'
bind -n M-z resize-pane -Z

bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind '$' command-prompt -I '#S' {
	rename-session '%%'
}
bind ',' command-prompt -I '#W' {
	rename-window '%%'
}

bind : command-prompt

bind s send-keys -R Enter
bind S {
	send-keys -R Enter
	clear-history
}

# bind -n F12 {
# 	set status
# 	set key-table nested
# 	set prefix None
# }
# bind -T nested F12 {
# 	set status
# 	set key-table root
# 	set prefix C-a
# }

bind \\ split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

bind -n M-n next-window
bind -n M-p previous-window

bind Space next-layout
bind Tab rotate-window

bind -n C-o copy-mode
bind -n M-p paste-buffer -p
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'
