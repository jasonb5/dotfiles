unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind '\' split-window -h
bind - split-window -v
unbind '"'
unbind %

bind r source-file ~/.tmux.conf; display-message "Config reloaded"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r C-h previous-window
bind -r C-l next-window
bind -r C-b last-window

set -g history-limit 100000
set -g default-terminal screen-256color

set -g status on
set -g status-interval 5
set -g status-position top

set -s escape-time 10  # faster command sequence

setw -g mode-keys vi

set -g base-index 1
setw -g pane-base-index 1

set -g set-titles off

set -g monitor-activity on
set -g visual-activity off

set -g @plugin 'tmux-plugins/'
set -g @plugin 'tmux-plugins/sensible'

set -g @plugin 'dracula/tmux'

set -g @dracula-plugins 'cpu-usage gpu-usage weather time'
set -g @dracula-show-powerline true

set -g @dracula-show-timezone false
set -g @dracula-military-time true

set -g @dracula-show-fahrenheit true

if-shell 'test -n "$SSH_CLIENT"' \
    'source-file ~/.tmux.remote.conf'

bind -T root F12 \
    set prefix None \;\
    set key-table off \;\
    set status-left 'OFF' \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    refresh-client -S \;\

bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set status-left '#[bg=#50fa7b,fg=#282a36]#{?client_prefix,#[bg=#f1fa8c],} ☺  #[fg=#50fa7b,bg=#44475a]#{?client_prefix,#[fg=#f1fa8c],}'
    refresh-client -S

run '~/.tmux/plugins/tpm/tpm'
