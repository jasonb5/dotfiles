apiVersion: v1
kind: Service
metadata:
  name: {{ "{{" }} include "{{cookiecutter.chart_name}}.fullname" . {{ "}}" }}
  labels:
    {{ "{{-" }} include "{{cookiecutter.chart_name}}.labels" . | nindent 4 {{ "}}" }}
spec:
  type: {{ "{{" }} .Values.service.type {{ "}}" }}
  ports:
    - port: {{ "{{" }} .Values.service.port {{ "}}" }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{ "{{-" }} include "{{cookiecutter.chart_name}}.selectorLabels" . | nindent 4 {{ "}}" }}
